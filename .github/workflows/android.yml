name: Build Android APK

# Builds an installable debug APK in the cloud and publishes it to a GitHub
# Release so you can download it directly onto your phone.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app (Vite)
        run: npm run build

      - name: Add Android platform (Capacitor)
        run: npx cap add android

      - name: Generate app icon & splash screen
        run: >
          npx @capacitor/assets generate --android
          --iconBackgroundColor '#0b1020'
          --iconBackgroundColorDark '#0b1020'
          --splashBackgroundColor '#0b1020'
          --splashBackgroundColorDark '#070b16'

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk fortuner-rush.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: fortuner-rush-apk
          path: fortuner-rush.apk

      - name: Publish APK to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Fortuner Rush (Android APK)
          body: |
            Latest installable Android debug APK for Fortuner Rush.

            How to install on your phone:
            1. Open this page on your Android phone.
            2. Download `fortuner-rush.apk`.
            3. Tap it, allow "Install unknown apps" for your browser if prompted, then Install.
          files: fortuner-rush.apk
          make_latest: true

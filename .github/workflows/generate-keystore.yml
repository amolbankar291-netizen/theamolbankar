name: Generate Android Keystore (run once)

# Run this ONCE (Actions tab -> "Generate Android Keystore" -> Run workflow).
# It creates a signing keystore in the cloud and uploads it as an artifact
# together with the passwords and the base64 you must paste into repo Secrets.
# Nothing secret is printed to the public logs.

on:
  workflow_dispatch: {}

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create keystore + credentials
        run: |
          ALIAS="fortuner"
          STOREPASS=$(openssl rand -hex 18)
          KEYPASS=$(openssl rand -hex 18)

          keytool -genkeypair -v \
            -keystore keystore.jks \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STOREPASS" -keypass "$KEYPASS" \
            -dname "CN=Fortuner Rush, OU=Games, O=Amol Bankar, L=City, ST=State, C=IN"

          B64=$(base64 -w0 keystore.jks)

          {
            echo "FORTUNER RUSH — Android signing credentials"
            echo "==========================================="
            echo ""
            echo "KEEP THIS FILE SAFE AND PRIVATE. If you lose it you can never"
            echo "update the same app on the Play Store again."
            echo ""
            echo "Add these 4 repository secrets:"
            echo "  (GitHub repo -> Settings -> Secrets and variables -> Actions -> New repository secret)"
            echo ""
            echo "KEY_ALIAS = $ALIAS"
            echo "KEYSTORE_PASSWORD = $STOREPASS"
            echo "KEY_PASSWORD = $KEYPASS"
            echo ""
            echo "KEYSTORE_BASE64 = (paste the single line below)"
            echo "$B64"
          } > CREDENTIALS.txt

      - name: Upload keystore bundle (download & keep safe)
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore-KEEP-SAFE
          path: |
            keystore.jks
            CREDENTIALS.txt
          retention-days: 7

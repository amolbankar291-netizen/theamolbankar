name: Build Signed Release (Play Store)

# Produces a SIGNED release .aab (for Play Store upload) and a signed .apk.
# Requires these repository secrets (see the "Generate Android Keystore" workflow):
#   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify signing secrets exist
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Missing signing secrets. Run 'Generate Android Keystore' first and add KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app (Vite)
        run: npm run build

      - name: Add Android platform (Capacitor)
        run: npx cap add android

      - name: Generate app icon & splash screen
        run: >
          npx @capacitor/assets generate --android
          --iconBackgroundColor '#0b1020'
          --iconBackgroundColorDark '#0b1020'
          --splashBackgroundColor '#0b1020'
          --splashBackgroundColorDark '#070b16'

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/keystore.jks"

      - name: Build signed AAB + APK
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/keystore.jks" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Collect outputs
        run: |
          cp android/app/build/outputs/bundle/release/app-release.aab fortuner-rush.aab
          cp android/app/build/outputs/apk/release/app-release.apk fortuner-rush-release.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fortuner-rush-release
          path: |
            fortuner-rush.aab
            fortuner-rush-release.apk

      - name: Publish signed build to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: playstore-latest
          name: Fortuner Rush (Signed release)
          body: |
            Signed release build.
            - `fortuner-rush.aab` -> upload this to Google Play Console.
            - `fortuner-rush-release.apk` -> signed APK for direct install/testing.
          files: |
            fortuner-rush.aab
            fortuner-rush-release.apk

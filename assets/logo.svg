<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#182252"/>
      <stop offset="1" stop-color="#080c1a"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd23f"/>
      <stop offset="1" stop-color="#ff7a1a"/>
    </linearGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2de2e6" stop-opacity="0"/>
      <stop offset="1" stop-color="#2de2e6" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="head" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff6cf"/>
      <stop offset="1" stop-color="#fff6cf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- speed streaks -->
  <g opacity="0.9">
    <rect x="90" y="440" width="360" height="20" rx="10" fill="url(#streak)"/>
    <rect x="60" y="500" width="470" height="26" rx="13" fill="url(#streak)"/>
    <rect x="110" y="566" width="300" height="18" rx="9" fill="url(#streak)"/>
  </g>

  <!-- headlight glow -->
  <circle cx="792" cy="560" r="150" fill="url(#head)"/>

  <!-- SUV silhouette -->
  <g transform="translate(300 380)">
    <!-- lower body -->
    <rect x="40" y="150" width="470" height="120" rx="26" fill="url(#body)"/>
    <!-- cabin -->
    <path d="M120 150 L180 70 L400 70 L460 150 Z" fill="url(#body)"/>
    <!-- windows -->
    <path d="M170 140 L210 92 L300 92 L300 140 Z" fill="#0c1226"/>
    <path d="M320 140 L320 92 L385 92 L420 140 Z" fill="#0c1226"/>
    <!-- headlight -->
    <rect x="486" y="180" width="34" height="34" rx="8" fill="#fff6cf"/>
    <!-- wheels -->
    <circle cx="160" cy="278" r="60" fill="#0c0f1a"/>
    <circle cx="160" cy="278" r="26" fill="#c9ced8"/>
    <circle cx="400" cy="278" r="60" fill="#0c0f1a"/>
    <circle cx="400" cy="278" r="26" fill="#c9ced8"/>
  </g>

  <!-- initials -->
  <text x="512" y="880" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900"
        font-size="150" fill="#ffffff" letter-spacing="6">FR</text>
</svg>
